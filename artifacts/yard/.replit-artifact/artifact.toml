kind = "web"
previewPath = "/yard/"
title = "Yard Manager"
version = "1.0.0"
id = "artifacts/yard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/yard/" ]
localPort = 21273

[services.development]
run = "pnpm --filter @workspace/yard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yard", "run", "build" ]
publicDir = "artifacts/yard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21273"
BASE_PATH = "/yard/"
