      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                author: { type: string }
                text: { type: string }
              required: [author, text]
      responses:
        "201":
          description: Note added

