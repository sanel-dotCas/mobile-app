  # ════════════════════════════════════════════════════════════════════════════
  # JOBS (Repair Orders)
  # ════════════════════════════════════════════════════════════════════════════
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all service/repair jobs
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, in_progress, completed, cancelled] }
        - name: technicianId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items: { $ref: "#/components/schemas/Job" }
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new service job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                estimateNumber: { type: string }
                licensePlate: { type: string }
                vehicleYear: { type: string }
                vehicleMake: { type: string }
                vehicleModel: { type: string }
                serviceAdvisor: { type: string }
                totalEstimatedHours: { type: string }
                customerNotes: { type: string }
                odometer: { type: integer }
                appointmentDate: { type: string }
                assignedTechnicianId: { type: string }
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }

  /jobs/odometer:
    get:
      operationId: getOdometerReadings
      tags: [jobs]
      summary: Get odometer correction history
      responses:
        "200":
          description: Odometer records

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get full job detail including tasks, parts, and notes
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
        "404":
          description: Not found
    patch:
      operationId: patchJob
      tags: [jobs]
      summary: Partial update of a job (status, progress, assigned technician, stage, task clock-in)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending, in_progress, completed, cancelled] }
                progress: { type: integer }
                assignedTechnicianId: { type: string }
                currentStageId: { type: string }
                taskId: { type: string }
                clockedIn: { type: boolean }
                taskStatus: { type: string, enum: [pending, in_progress, done] }
                workedHours: { type: number }
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
    put:
      operationId: replaceJob
      tags: [jobs]
      summary: Full replacement of a job record
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Job" }
      responses:
        "200":
          description: Replaced job
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /jobs/{id}/notes:
    post:
      operationId: addJobNote
      tags: [jobs]
      summary: Add a note to a job
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                author: { type: string }
                text: { type: string }
                subject: { type: string }
              required: [author, text]
      responses:
        "201":
          description: Note added

  /jobs/{id}/tasks/{taskId}/notes:
    post:
