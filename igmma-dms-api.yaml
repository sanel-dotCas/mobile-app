      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Session completed and stock adjusted

  # ── RFQ (Request for Quotation) ───────────────────────────────────────────
  /parts/rfq:
    get:
      operationId: listRfqs
      tags: [parts]
      summary: List supplier RFQs
      responses:
        "200":
          description: RFQ list
    post:
      operationId: createRfq
      tags: [parts]
      summary: Create a new supplier RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject: { type: string }
                dueDate: { type: string }
                notes: { type: string }
                suppliers:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      email: { type: string }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      partNumber: { type: string }
                      partName: { type: string }
                      qtyRequired: { type: integer }
                      description: { type: string }
                      unitOfMeasure: { type: string }
              required: [subject, suppliers, items]
      responses:
        "201":
          description: RFQ created

  /parts/rfq/{id}/send:
    patch:
      operationId: sendRfq
      tags: [parts]
      summary: Send the RFQ to all suppliers (emails supplier form links)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: RFQ sent

  /parts/rfq/{token}/form:
    get:
      operationId: getRfqSupplierForm
      tags: [parts]
      summary: Public supplier quote submission form (HTML page, no auth required)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
          description: Unique supplier token from the RFQ email link
      responses:
        "200":
          description: HTML form page
          content:
            text/html:
              schema: { type: string }

  /parts/rfq/{token}/submit:
    post:
      operationId: submitRfqQuote
      tags: [parts]
      summary: Supplier submits their quoted prices via the form token
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId: { type: integer }
                      unitPrice: { type: string }
                      notes: { type: string }
      responses:
        "200":
          description: Quote submitted

  # ════════════════════════════════════════════════════════════════════════════
  # ESTIMATES
  # ════════════════════════════════════════════════════════════════════════════
  /estimates/account-types:
    get:
      operationId: listAccountTypes
      tags: [estimates]
      summary: List available DMS account types (CP, WR, IN, SL, etc.)
      responses:
        "200":
          description: Account types
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DmsAccountType" }

  /estimates/analyze:
    post:
      operationId: analyzeEstimate
      tags: [estimates]
      summary: AI-powered damage estimate analysis — generates estimate lines from vehicle info and damage notes/images
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vehicleInfo: { type: string }
                damageNotes: { type: string }
                imagesBase64:
                  type: array
                  items: { type: string }
              required: [vehicleInfo, damageNotes]
      responses:
        "200":
          description: Generated estimate lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  lines:
                    type: array
                    items: { $ref: "#/components/schemas/EstimateLine" }

  /estimates/submit:
    post:
      operationId: submitEstimate
      tags: [estimates]
      summary: Submit a finalized estimate to the DMS; returns a DMS Repair Order number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                estimateId: { type: string }
                estimateNo: { type: string }
                vehicle: { type: string }
                customer: { type: string }
                serviceAdvisor: { type: string }
                odometer: { type: string }
                lines:
                  type: array
                  items: { $ref: "#/components/schemas/EstimateLine" }
              required: [estimateId, estimateNo, vehicle, lines]
      responses:
        "200":
          description: DMS submission result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  dmsRoNumber: { type: string, nullable: true }
                  message: { type: string }

  # ════════════════════════════════════════════════════════════════════════════
  # SERVICE PACKAGES
  # ════════════════════════════════════════════════════════════════════════════
  /service-packages:
    get:
      operationId: listServicePackages
      tags: [service-packages]
      summary: List all service packages with line counts and active status
      responses:
        "200":
          description: Service packages

  /service-packages/template:
    get:
      operationId: getServicePackageTemplate
      tags: [service-packages]
      summary: Download a blank Excel template for bulk service package import
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }

  /service-packages/{id}:
    get:
      operationId: getServicePackage
      tags: [service-packages]
      summary: Get service package detail with all line items
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Service package detail

  /service-packages/upload:
    post:
      operationId: uploadServicePackages
      tags: [service-packages]
      summary: Bulk import service packages via Excel file upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result

  # ════════════════════════════════════════════════════════════════════════════
  # ADMIN  (requires admin role — x-yard-user-id must belong to admin user)
  # ════════════════════════════════════════════════════════════════════════════
  /admin/stats:
    get:
      operationId: adminStats
      tags: [admin]
      summary: System-wide statistics (vehicles, inspections, jobs, technicians, users)
      parameters:
        - name: locationId
          in: query
          schema: { type: integer }
          description: Filter by location (omit for all locations)
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminStats" }

  /admin/activity:
    get:
      operationId: adminActivity
      tags: [admin]
      summary: Recent system activity feed (last 20 yard movements)
      parameters:
        - name: locationId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Activity feed

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all yard system users
      responses:
        "200":
          description: Users list
    post:
      operationId: adminCreateUser
      tags: [admin]
      summary: Create a new yard user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                name: { type: string }
                role: { type: string, enum: [yard_manager, yard_operator, admin] }
                locationId: { type: integer }
              required: [username, password, name, role]
      responses:
        "201":
          description: Created user

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update user fields (name, role, location, notifications)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                role: { type: string, enum: [yard_manager, yard_operator, admin] }
                locationId: { type: integer, nullable: true }
                notificationsEnabled: { type: boolean }
      responses:
        "200":
          description: Updated user
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /admin/technicians:
    get:
      operationId: adminListTechnicians
      tags: [admin]
      summary: List all DMS technicians
      responses:
        "200":
          description: Technicians list
    post:
      operationId: adminCreateTechnician
      tags: [admin]
      summary: Create a new technician profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string }
                name: { type: string }
                role: { type: string }
                avatar: { type: string }
                userCode: { type: string }
                specializations:
                  type: array
                  items: { type: string }
              required: [id, name, role, avatar, userCode]
      responses:
        "201":
          description: Created technician

  /admin/technicians/{id}:
    patch:
      operationId: adminUpdateTechnician
      tags: [admin]
      summary: Update technician profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Technician" }
      responses:
        "200":
          description: Updated technician
    delete:
      operationId: adminDeleteTechnician
      tags: [admin]
      summary: Delete a technician profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /admin/roles:
    get:
      operationId: adminGetRoles
      tags: [admin]
      summary: Get all role permission matrices (Yard roles + DMS mobile roles)
      responses:
        "200":
          description: Role permissions map

  /admin/locations:
    get:
      operationId: adminListLocations
      tags: [admin]
      summary: List all yard locations (admin view)
      responses:
        "200":
          description: Locations list

  /admin/service-packages:
    get:
      operationId: adminListServicePackages
      tags: [admin]
      summary: List service packages with line counts
      responses:
        "200":
          description: Service packages

  /admin/account-types:
    get:
      operationId: adminListAccountTypes
      tags: [admin]
      summary: List DMS account types
      responses:
        "200":
          description: Account types list
    post:
      operationId: adminCreateAccountType
      tags: [admin]
      summary: Create a new DMS account type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                code: { type: string }
                displayOrder: { type: integer }
                isActive: { type: boolean }
              required: [name, code]
      responses:
        "201":
          description: Created

  /admin/account-types/{id}:
    patch:
      operationId: adminUpdateAccountType
      tags: [admin]
      summary: Update a DMS account type
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DmsAccountType" }
      responses:
        "200":
          description: Updated
    delete:
      operationId: adminDeleteAccountType
      tags: [admin]
      summary: Delete a DMS account type
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /admin/monitor/vehicles:
    get:
      operationId: adminMonitorVehicles
      tags: [admin]
      summary: Vehicle inventory monitor — list with status breakdown
      parameters:
        - name: locationId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Vehicle monitor data

  /admin/monitor/inspections:
    get:
      operationId: adminMonitorInspections
      tags: [admin]
      summary: Inspection monitor — list with status breakdown
      parameters:
        - name: locationId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Inspection monitor data

  /admin/monitor/jobs:
    get:
      operationId: adminMonitorJobs
      tags: [admin]
      summary: Jobs monitor — list with status breakdown
      responses:
        "200":
          description: Jobs monitor data

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: System settings — mobile credentials list, notification config, system info
      responses:
        "200":
          description: System settings
