openapi: 3.1.0
info:
  title: IGMMA DMS API
  version: 1.0.0
  description: |
    Complete REST API for the IGMMA Dealer Management System.

    ## Authentication
    Most endpoints require the `x-yard-user-id` header containing the integer user ID
    obtained from `POST /api/yard/auth/login`.

    ## Base URL
    All paths below are relative to `/api` (e.g. `https://your-domain.replit.app/api`).

servers:
  - url: /api
    description: Production (relative)

security:
  - yardUserId: []

components:
  securitySchemes:
    yardUserId:
      type: apiKey
      in: header
      name: x-yard-user-id
      description: Integer user ID returned by the login endpoint

  schemas:

    # ── Common ────────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    # ── Auth ──────────────────────────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]

    YardUser:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        role:
          type: string
          enum: [yard_manager, yard_operator, admin]
        locationId: { type: integer, nullable: true }
      required: [id, username, name, role]

    # ── Vehicles ──────────────────────────────────────────────────────────────
    YardVehicle:
      type: object
      properties:
        id: { type: integer }
        stockNumber: { type: string }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        color: { type: string }
        vin: { type: string }
        status:
          type: string
          enum: [available, in_transit, pdi_pending, sold]
        locationId: { type: integer, nullable: true }
        locationName: { type: string, nullable: true }
        spotCode: { type: string, nullable: true }
        mileage: { type: integer, nullable: true }
        price: { type: number, nullable: true }
        inspectionIntervalDays: { type: integer, nullable: true }
        createdAt: { type: string }
      required: [id, stockNumber, make, model, year, color, vin, status]

    CreateVehicleBody:
      type: object
      properties:
        stockNumber: { type: string }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        color: { type: string }
        vin: { type: string }
        status: { type: string, enum: [available, in_transit, pdi_pending, sold] }
        locationId: { type: integer }
        mileage: { type: integer }
        price: { type: number }
        inspectionIntervalDays: { type: integer }
      required: [stockNumber, make, model, year, color, vin]

    UpdateVehicleBody:
      type: object
      properties:
        status: { type: string, enum: [available, in_transit, pdi_pending, sold] }
        locationId: { type: integer, nullable: true }
        mileage: { type: integer }
        price: { type: number }
        color: { type: string }
        inspectionIntervalDays: { type: integer }

    VehicleList:
      type: object
      properties:
        vehicles:
          type: array
          items: { $ref: "#/components/schemas/YardVehicle" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
      required: [vehicles, total, page, limit]

    # ── Inspections ───────────────────────────────────────────────────────────
    YardInspection:
      type: object
      properties:
        id: { type: integer }
        inspectionNumber: { type: string }
        vehicleId: { type: integer }
        vehicleName: { type: string }
        stockVin: { type: string }
        status: { type: string, enum: [queued, in-progress, finished] }
        type: { type: string }
        locationId: { type: integer, nullable: true }
        locationName: { type: string, nullable: true }
        assignedTo: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        bodyDamage: { type: string, nullable: true }
        fuelPercentage: { type: integer, nullable: true }
        createdAt: { type: string }
        completedAt: { type: string, nullable: true }
      required: [id, inspectionNumber, vehicleId, vehicleName, status, type]

    CreateInspectionBody:
      type: object
      properties:
        vehicleId: { type: integer }
        type:
          type: string
          enum: [pre-inspection, secondary, final-quality, new-arrival, used-arrival, periodic-fluid, periodic-damage, start-and-run]
        assignedTo: { type: string }
        notes: { type: string }
      required: [vehicleId, type]

    UpdateInspectionBody:
      type: object
      properties:
        status: { type: string, enum: [queued, in-progress, finished] }
        notes: { type: string }
        bodyDamage: { type: string }
        fuelPercentage: { type: integer }
        completedAt: { type: string }
        assignedTo: { type: string }

    InspectionList:
      type: object
      properties:
        inspections:
          type: array
          items: { $ref: "#/components/schemas/YardInspection" }
        total: { type: integer }
      required: [inspections, total]

    GenerateInspectionsBody:
      type: object
      properties:
        intervalDays: { type: integer, description: "Include vehicles overdue or due within this many days" }
        autoAssign: { type: boolean, default: true }
        inspectionType:
          type: string
          enum: [periodic-fluid, periodic-damage, start-and-run]
      required: [intervalDays]

    GenerateInspectionsResponse:
      type: object
      properties:
        created: { type: integer }
        assigned: { type: integer }
        skipped: { type: integer }
      required: [created, assigned, skipped]

    # ── Locations ─────────────────────────────────────────────────────────────
    YardLocation:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string, enum: [DEALERSHIP_LOT, YARD, PARKING_AREA, PORT] }
        city: { type: string }
        address: { type: string, nullable: true }
        totalCapacity: { type: integer }
        occupied: { type: integer }
        arrived: { type: integer }
        inYard: { type: integer }
        readyPDI: { type: integer }
        readySale: { type: integer }
        autoChecks: { type: boolean }
      required: [id, name, type, city, totalCapacity, occupied]

    MovementEntry:
      type: object
      properties:
        id: { type: integer }
        locationId: { type: integer }
        locationName: { type: string }
        vehicleId: { type: integer, nullable: true }
        vehicleName: { type: string, nullable: true }
        action: { type: string }
        actor: { type: string }
        createdAt: { type: string }
      required: [id, locationId, locationName, action, actor, createdAt]

    # ── Transfers ─────────────────────────────────────────────────────────────
    YardTransfer:
      type: object
      properties:
        id: { type: integer }
        transferNumber: { type: string }
        vehicleId: { type: integer }
        fromLocationId: { type: integer }
        toLocationId: { type: integer }
        fromLocationName: { type: string }
        toLocationName: { type: string }
        status: { type: string, enum: [pending, in_transit, completed, cancelled] }
        requestedBy: { type: string }
        notes: { type: string, nullable: true }
        scheduledAt: { type: string, nullable: true }
        completedAt: { type: string, nullable: true }
        createdAt: { type: string }
      required: [id, transferNumber, vehicleId, fromLocationId, toLocationId, status]

    # ── Technicians ───────────────────────────────────────────────────────────
    Technician:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string }
        avatar: { type: string }
        status: { type: string, enum: [active, idle, break, absent] }
        currentJobId: { type: string, nullable: true }
        totalHoursToday: { type: number }
        efficiency: { type: integer }
        weekHoursBooked: { type: number }
        monthHoursBooked: { type: number }
        specializations:
          type: array
          items: { type: string }
        completedJobs: { type: integer }
      required: [id, name, role, avatar, status]

    # ── Jobs ──────────────────────────────────────────────────────────────────
    Job:
      type: object
      properties:
        id: { type: string }
        estimateNumber: { type: string }
        licensePlate: { type: string }
        vehicleYear: { type: string }
        vehicleMake: { type: string }
        vehicleModel: { type: string }
        serviceAdvisor: { type: string }
        totalEstimatedHours: { type: string }
        workedHours: { type: string }
        customerNotes: { type: string, nullable: true }
        odometer: { type: integer, nullable: true }
        appointmentDate: { type: string, nullable: true }
        status: { type: string, enum: [pending, in_progress, completed, cancelled] }
        progress: { type: integer, description: "Percentage 0-100" }
        assignedTechnicianId: { type: string, nullable: true }
        currentStageId: { type: string, nullable: true }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/JobTask" }
      required: [id, estimateNumber, status, progress]

    JobTask:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        type: { type: string }
        laborType: { type: string }
        status: { type: string, enum: [pending, in_progress, done] }
        estimatedHours: { type: number }
        workedHours: { type: number }
        description: { type: string, nullable: true }
        technician: { type: string, nullable: true }
        clockedIn: { type: boolean }
        elapsedSeconds: { type: integer }
        parts:
          type: array
          items: { $ref: "#/components/schemas/JobPart" }
        notes:
          type: array
          items: { $ref: "#/components/schemas/JobNote" }
      required: [id, title, status]

    JobPart:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        partNumber: { type: string }
        quantity: { type: integer }
        unit: { type: string }
        status: { type: string, enum: [pending, ordered, received] }
        price: { type: number }
        receivedAt: { type: string, nullable: true }
      required: [id, name, partNumber, quantity, status]

    JobNote:
      type: object
      properties:
        id: { type: string }
        author: { type: string }
        text: { type: string }
        subject: { type: string, nullable: true }
        timestamp: { type: string }
      required: [id, author, text, timestamp]

    # ── Parts ─────────────────────────────────────────────────────────────────
    PartsItem:
      type: object
      properties:
        id: { type: integer }
        partNumber: { type: string }
        name: { type: string }
        category: { type: string }
        binCode: { type: string, nullable: true }
        qtyOnHand: { type: integer }
        minStock: { type: integer }
        maxStock: { type: integer }
        unitCost: { type: string }
        unitSalePrice: { type: string }
        supplierCode: { type: string, nullable: true }
        isActive: { type: boolean }
      required: [id, partNumber, name, category, qtyOnHand, minStock, maxStock, unitCost, unitSalePrice]

    PartsOrder:
      type: object
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        supplier: { type: string }
        status: { type: string, enum: [draft, pending, approved, received, partial, cancelled] }
        totalAmount: { type: string }
        notes: { type: string, nullable: true }
        orderedAt: { type: string, nullable: true }
        receivedAt: { type: string, nullable: true }
        createdAt: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/PartsOrderItem" }
      required: [id, orderNumber, supplier, status]

    PartsOrderItem:
      type: object
      properties:
        id: { type: integer }
        orderId: { type: integer }
        partNumber: { type: string }
        partName: { type: string }
        qtyOrdered: { type: integer }
        qtyReceived: { type: integer }
        unitCost: { type: string }
      required: [id, orderId, partNumber, partName, qtyOrdered]

    PartsSale:
      type: object
      properties:
        id: { type: integer }
        saleNumber: { type: string }
        customerName: { type: string, nullable: true }
        roNumber: { type: string, nullable: true }
        status: { type: string, enum: [open, paid, returned, cancelled] }
        totalAmount: { type: string }
        soldBy: { type: string }
        createdAt: { type: string }
        items:
          type: array
          items:
            type: object
            properties:
              partNumber: { type: string }
              partName: { type: string }
              qtySold: { type: integer }
              unitSalePrice: { type: string }
      required: [id, saleNumber, status, totalAmount, soldBy]

    PartsRfq:
      type: object
      properties:
        id: { type: integer }
        rfqNumber: { type: string }
        subject: { type: string }
        status: { type: string, enum: [draft, sent, responded, closed] }
        dueDate: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string }
        suppliers:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
              token: { type: string }
              submittedAt: { type: string, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              partNumber: { type: string }
              partName: { type: string }
              qtyRequired: { type: integer }
              description: { type: string, nullable: true }
      required: [id, rfqNumber, subject, status]

    # ── Estimates ─────────────────────────────────────────────────────────────
    EstimateLine:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [labor, part, material] }
        laborCategory:
          type: string
          enum: [body, refinish, mechanical, frame, glass, electrical, trim, other]
          nullable: true
        description: { type: string }
        hours: { type: number, nullable: true }
        quantity: { type: number, nullable: true }
        unitPrice: { type: number }
        total: { type: number }
        operation: { type: string, nullable: true }
        accountType: { type: string, nullable: true }
      required: [id, type, description, unitPrice, total]

    DmsAccountType:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        displayOrder: { type: integer }
        isActive: { type: boolean }
      required: [id, name, code, displayOrder, isActive]

    # ── Admin ─────────────────────────────────────────────────────────────────
    AdminStats:
      type: object
      properties:
        vehicles:
          type: object
          properties:
            total: { type: integer }
            byStatus: { type: object, additionalProperties: { type: integer } }
        inspections:
          type: object
          properties:
            total: { type: integer }
            byStatus: { type: object, additionalProperties: { type: integer } }
        jobs:
          type: object
          properties:
            total: { type: integer }
            byStatus: { type: object, additionalProperties: { type: integer } }
        technicians: { type: integer }
        users: { type: integer }
        locations: { type: integer }
        servicePackages: { type: integer }
      required: [vehicles, inspections, jobs, technicians, users, locations, servicePackages]

tags:
  - name: health
    description: System health
  - name: auth
    description: Authentication
  - name: vehicles
    description: Vehicle inventory management
  - name: inspections
    description: PDI & periodic inspections
  - name: locations
    description: Yard locations & movement feed
  - name: transfers
    description: Vehicle transfers between locations
  - name: technicians
    description: Technician profiles & KPIs
  - name: jobs
    description: Service / repair order jobs
  - name: parts
    description: Parts inventory, orders, sales, RFQ
  - name: estimates
    description: AI-powered damage estimate analysis & DMS submission
  - name: service-packages
    description: Service package templates
  - name: admin
    description: Admin — users, roles, system monitor (requires admin role)

paths:

  # ════════════════════════════════════════════════════════════════════════════
  # HEALTH
  # ════════════════════════════════════════════════════════════════════════════
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════
  /yard/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login — returns user object; store `id` and send as `x-yard-user-id` header
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
            example:
              username: admin
              password: admin123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardUser" }
        "401":
          description: Invalid credentials

  /yard/auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout / invalidate session
      responses:
        "200":
          description: Logged out

  /yard/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardUser" }
        "401":
          description: Not authenticated

  # ════════════════════════════════════════════════════════════════════════════
  # VEHICLES
  # ════════════════════════════════════════════════════════════════════════════
  /yard/vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List vehicle inventory (paginated, filterable)
      parameters:
        - name: q
          in: query
          schema: { type: string }
          description: Search by make, model, stock #, or VIN
        - name: status
          in: query
          schema: { type: string, enum: [available, in_transit, pdi_pending, sold, all] }
        - name: locationId
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 15 }
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VehicleList" }
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Add a new vehicle to inventory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVehicleBody" }
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardVehicle" }

  /yard/vehicles/{vehicleId}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle detail
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardVehicle" }
        "404":
          description: Not found
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle fields (status, location, price, mileage, etc.)
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateVehicleBody" }
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardVehicle" }

  /yard/vehicles/{vehicleId}/inspection-history:
    get:
      operationId: getVehicleInspectionHistory
      tags: [vehicles]
      summary: Get inspection history for a specific vehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Inspection history
          content:
            application/json:
              schema:
                type: object
                properties:
                  inspections:
                    type: array
                    items: { $ref: "#/components/schemas/YardInspection" }

  # ════════════════════════════════════════════════════════════════════════════
  # INSPECTIONS
  # ════════════════════════════════════════════════════════════════════════════
  /yard/inspections:
    get:
      operationId: listInspections
      tags: [inspections]
      summary: List PDI inspections (filterable by status, location, page)
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [queued, in-progress, finished, all] }
        - name: locationId
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 15 }
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InspectionList" }
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create a new PDI or periodic inspection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInspectionBody" }
      responses:
        "201":
          description: Created inspection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardInspection" }

  /yard/inspections/{inspectionId}:
    patch:
      operationId: updateInspection
      tags: [inspections]
      summary: Update inspection status, notes, fuel level, body damage, assignment
      parameters:
        - name: inspectionId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateInspectionBody" }
      responses:
        "200":
          description: Updated inspection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/YardInspection" }

  /yard/inspections/generate:
    post:
      operationId: generateInspections
      tags: [inspections]
      summary: Batch-generate periodic inspections for vehicles due within an interval
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GenerateInspectionsBody" }
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenerateInspectionsResponse" }

  /yard/inspections/auto-assign:
    post:
      operationId: autoAssignInspections
      tags: [inspections]
      summary: Distribute unassigned queued inspections evenly across available technicians
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inspectionIds:
                  type: array
                  items: { type: integer }
                  description: Optional — defaults to all unassigned queued inspections
      responses:
        "200":
          description: Assignment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  assigned: { type: integer }
                  total: { type: integer }

  /yard/inspection-recommendations:
    get:
      operationId: getInspectionRecommendations
      tags: [inspections]
      summary: AI-generated inspection schedule recommendations per vehicle
      responses:
        "200":
          description: Recommendations list
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      type: object
                      properties:
                        vehicleId: { type: integer }
                        vehicleName: { type: string }
                        stockNumber: { type: string }
                        urgency: { type: string, enum: [overdue, due-soon, ok] }
                        daysRemaining: { type: integer }
                        daysSinceArrival: { type: integer }
                        lastInspectedAt: { type: string, nullable: true }
                        nextDueDate: { type: string }
                        aiRecommendation: { type: string }

  # ════════════════════════════════════════════════════════════════════════════
  # LOCATIONS
  # ════════════════════════════════════════════════════════════════════════════
  /yard/locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all yard locations with occupancy stats
      responses:
        "200":
          description: Locations list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/YardLocation" }
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a new yard location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
