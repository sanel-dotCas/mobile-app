openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: estimates
    description: Estimate analysis and DMS submission
  - name: yard-auth
    description: Yard authentication
  - name: yard-locations
    description: Yard locations management
  - name: yard-spots
    description: Spot assignment and management
  - name: yard-vehicles
    description: Vehicle inventory
  - name: yard-inspections
    description: PDI & inspections
  - name: yard-dashboard
    description: Dashboard statistics
  - name: technicians
    description: Technician data and KPI stats
paths:
  # ── Estimates ─────────────────────────────────────────────────────────────
  /estimates/account-types:
    get:
      operationId: getEstimateAccountTypes
      tags: [estimates]
      summary: List available DMS account types
      responses:
        "200":
          description: List of account types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DmsAccountType"

  /estimates/analyze:
    post:
      operationId: analyzeEstimate
      tags: [estimates]
      summary: AI-powered damage estimate analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeEstimateRequest"
      responses:
        "200":
          description: Generated estimate lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeEstimateResponse"
        "400":
          description: Missing required fields
        "500":
          description: AI analysis failed

  /estimates/submit:
    post:
      operationId: submitEstimateToDms
      tags: [estimates]
      summary: Submit an estimate to the DMS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitEstimateRequest"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitEstimateResponse"
        "400":
          description: Invalid request
        "500":
          description: DMS submission failed

  # ── Technicians ───────────────────────────────────────────────────────────
  /technicians:
    get:
      operationId: listTechnicians
      tags: [technicians]
      summary: List all technicians with live status derived from jobs
      responses:
        "200":
          description: Technician list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianListResponse"
        "500":
          description: Server error

  /technicians/me/stats:
    get:
      operationId: getTechnicianStats
      tags: [technicians]
      summary: Get KPI stats for the authenticated technician
      parameters:
        - name: userCode
          in: query
          required: false
          schema:
            type: string
          description: Two-letter technician initials (e.g. MR, JW). Defaults to MR.
      responses:
        "200":
          description: Technician KPI stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TechnicianStats"
        "500":
          description: Server error

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /yard/auth/login:
    post:
      operationId: yardLogin
      tags: [yard-auth]
      summary: Login to yard manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YardLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardUser"
        "401":
          description: Invalid credentials

  /yard/auth/logout:
    post:
      operationId: yardLogout
      tags: [yard-auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /yard/auth/me:
    get:
      operationId: yardMe
      tags: [yard-auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardUser"
        "401":
          description: Not authenticated

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /yard/dashboard/stats:
    get:
      operationId: getYardDashboardStats
      tags: [yard-dashboard]
      summary: Get global yard dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardDashboardStats"

  # ── Locations ─────────────────────────────────────────────────────────────
  /yard/locations:
    get:
      operationId: listYardLocations
      tags: [yard-locations]
      summary: List all yard locations with capacity stats
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YardLocation"
    post:
      operationId: createYardLocation
      tags: [yard-locations]
      summary: Create a new location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYardLocationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardLocation"

  /yard/locations/{locationId}:
    get:
      operationId: getYardLocation
      tags: [yard-locations]
      summary: Get location detail with zones and spots
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Location detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardLocationDetail"

  /yard/locations/{locationId}/movement:
    get:
      operationId: getLocationMovementFeed
      tags: [yard-locations]
      summary: Get movement feed for a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Movement feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovementEntry"

  # ── Spots ─────────────────────────────────────────────────────────────────
  /yard/spots/{spotId}:
    patch:
      operationId: updateYardSpot
      tags: [yard-spots]
      summary: Update a spot (assign, release, reserve vehicle)
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYardSpotBody"
      responses:
        "200":
          description: Updated spot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardSpot"

  # ── Vehicles ──────────────────────────────────────────────────────────────
  /yard/vehicles:
    get:
      operationId: listYardVehicles
      tags: [yard-vehicles]
      summary: List vehicle inventory
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [available, in_transit, pdi_pending, sold, all]
        - name: locationId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardVehicleList"
    post:
      operationId: createYardVehicle
      tags: [yard-vehicles]
      summary: Add a new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYardVehicleBody"
      responses:
        "201":
          description: Created vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardVehicle"

  /yard/vehicles/{vehicleId}:
    get:
      operationId: getYardVehicle
      tags: [yard-vehicles]
      summary: Get vehicle detail
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardVehicle"
    patch:
      operationId: updateYardVehicle
      tags: [yard-vehicles]
      summary: Update vehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYardVehicleBody"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardVehicle"

  # ── Inspections ───────────────────────────────────────────────────────────
  /yard/inspections:
    get:
      operationId: listYardInspections
      tags: [yard-inspections]
      summary: List PDI inspections
      parameters:
        - name: locationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [finished, in-progress, queued, all]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: Inspection list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardInspectionList"
    post:
      operationId: createYardInspection
      tags: [yard-inspections]
      summary: Create a new PDI inspection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYardInspectionBody"
      responses:
        "201":
          description: Created inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardInspection"

  /yard/inspections/{inspectionId}:
    patch:
      operationId: updateYardInspection
      tags: [yard-inspections]
      summary: Update inspection status
      parameters:
        - name: inspectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYardInspectionBody"
      responses:
        "200":
          description: Updated inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YardInspection"

  /yard/inspections/generate:
    post:
      operationId: generateYardInspections
      tags: [yard-inspections]
      summary: Batch-generate periodic inspections for vehicles due within interval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateYardInspectionsBody"
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateYardInspectionsResponse"

  /yard/inspections/auto-assign:
    post:
      operationId: autoAssignYardInspections
      tags: [yard-inspections]
      summary: Distribute unassigned queued inspections evenly across available technicians
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoAssignYardInspectionsBody"
      responses:
        "200":
          description: Assignment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoAssignYardInspectionsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Technicians ──────────────────────────────────────────────────────────
    TechnicianRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        avatar:
          type: string
        currentJobId:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, idle, break, absent]
        totalHoursToday:
          type: number
        efficiency:
          type: integer
        weekHoursBooked:
          type: number
        monthHoursBooked:
          type: number
        specializations:
          type: array
          items:
            type: string
        completedJobs:
          type: integer
      required: [id, name, role, avatar, status, totalHoursToday, efficiency, weekHoursBooked, monthHoursBooked, specializations, completedJobs]

    TechnicianListResponse:
      type: object
      properties:
        technicians:
          type: array
          items:
            $ref: "#/components/schemas/TechnicianRecord"
      required: [technicians]

    TechnicianStats:
      type: object
      properties:
        totalTimeTracked:
          type: string
          description: Formatted string e.g. "12h 30m"
        productivity:
          type: integer
          description: Percentage 0-100
        workingPattern:
          type: object
          additionalProperties:
            type: string
            enum: [worked, partial, off]
          description: Map of ISO date string to work status
      required: [totalTimeTracked, productivity, workingPattern]

    # ── Auth ────────────────────────────────────────────────────────────────
    YardLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    YardUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [yard_manager, yard_operator, admin]
        locationId:
          type: integer
          nullable: true
      required: [id, username, name, role]

    # ── Dashboard ────────────────────────────────────────────────────────────
    YardDashboardStats:
      type: object
      properties:
        totalCapacity:
          type: integer
        totalOccupied:
          type: integer
        readyForPDI:
          type: integer
        readyForSale:
          type: integer
        expectedInbound:
          type: integer
        arrivingToday:
          type: integer
        totalLocations:
          type: integer
        recentMovements:
          type: array
          items:
            $ref: "#/components/schemas/MovementEntry"
      required: [totalCapacity, totalOccupied, readyForPDI, readyForSale, expectedInbound, arrivingToday, totalLocations, recentMovements]

    # ── Location ─────────────────────────────────────────────────────────────
    YardLocation:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [DEALERSHIP_LOT, YARD, PARKING_AREA, PORT]
        city:
          type: string
        address:
          type: string
          nullable: true
        totalCapacity:
          type: integer
        occupied:
          type: integer
        arrived:
          type: integer
        inYard:
          type: integer
        readyPDI:
          type: integer
        readySale:
          type: integer
        autoChecks:
          type: boolean
      required: [id, name, type, city, totalCapacity, occupied, arrived, inYard, readyPDI, readySale, autoChecks]

    CreateYardLocationBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [DEALERSHIP_LOT, YARD, PARKING_AREA, PORT]
        city:
          type: string
        address:
          type: string
        totalCapacity:
          type: integer
      required: [name, type, city, totalCapacity]

    YardLocationDetail:
      allOf:
        - $ref: "#/components/schemas/YardLocation"
        - type: object
          properties:
            zones:
              type: array
              items:
                $ref: "#/components/schemas/YardZone"
          required: [zones]

    YardZone:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [SHOWROOM_FRONT, NEW_INVENTORY, PDI_QUEUE, STANDARD, RECEIVING, OVERFLOW]
        isPremium:
          type: boolean
        spots:
          type: array
          items:
            $ref: "#/components/schemas/YardSpot"
      required: [id, locationId, name, type, isPremium, spots]

    YardSpot:
      type: object
      properties:
        id:
          type: integer
        zoneId:
          type: integer
        code:
          type: string
        status:
          type: string
          enum: [available, occupied, reserved, disabled]
        vehicleId:
          type: integer
          nullable: true
        vehicle:
          $ref: "#/components/schemas/YardVehicle"
          nullable: true
        reservedUntil:
          type: string
          nullable: true
        dimensions:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        spotType:
          type: string
          nullable: true
        timeInSpot:
          type: string
          nullable: true
      required: [id, zoneId, code, status]

    UpdateYardSpotBody:
      type: object
      properties:
        status:
          type: string
          enum: [available, occupied, reserved, disabled]
        vehicleId:
          type: integer
          nullable: true
        reservedUntil:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    # ── Vehicle ──────────────────────────────────────────────────────────────
    YardVehicle:
      type: object
      properties:
        id:
          type: integer
        vin:
          type: string
        stockNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
          nullable: true
        mileage:
          type: integer
          nullable: true
        condition:
          type: string
          enum: [new, used]
          nullable: true
        status:
          type: string
          enum: [available, in_transit, pdi_pending, sold]
        locationId:
          type: integer
          nullable: true
        locationName:
          type: string
          nullable: true
        spotId:
          type: integer
          nullable: true
        spotCode:
          type: string
          nullable: true
        zoneName:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        imageUrl:
          type: string
          nullable: true
        arrivedAt:
          type: string
          nullable: true
      required: [id, vin, stockNumber, make, model, year, status]

    YardVehicleList:
      type: object
      properties:
        vehicles:
          type: array
          items:
            $ref: "#/components/schemas/YardVehicle"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [vehicles, total, page, totalPages]

    CreateYardVehicleBody:
      type: object
      properties:
        vin:
          type: string
        stockNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        mileage:
          type: integer
        condition:
          type: string
          enum: [new, used]
        status:
          type: string
          enum: [available, in_transit, pdi_pending, sold]
        locationId:
          type: integer
        price:
          type: number
      required: [vin, stockNumber, make, model, year, status]

    UpdateYardVehicleBody:
      type: object
      properties:
        status:
          type: string
          enum: [available, in_transit, pdi_pending, sold]
        locationId:
          type: integer
          nullable: true
        spotId:
          type: integer
          nullable: true
        color:
          type: string
        price:
          type: number

    # ── Inspection ────────────────────────────────────────────────────────────
    YardInspection:
      type: object
      properties:
        id:
          type: integer
        inspectionNumber:
          type: string
        vehicleId:
          type: integer
        stockVin:
          type: string
        vehicleName:
          type: string
        vehicleYear:
          type: integer
          nullable: true
        stockNumber:
          type: string
          nullable: true
        type:
          type: string
          enum: [pre-inspection, secondary, final-quality, new-arrival, used-arrival, periodic-fluid, periodic-damage, start-and-run]
        status:
          type: string
          enum: [finished, in-progress, queued]
        locationId:
          type: integer
          nullable: true
        locationName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        bodyDamage:
          type: string
          nullable: true
        fuelPercentage:
          type: integer
          nullable: true
        vehicleMileage:
          type: integer
          nullable: true
        createdAt:
          type: string
        completedAt:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
        assignedAt:
          type: string
          nullable: true
      required: [id, inspectionNumber, vehicleId, stockVin, vehicleName, type, status, createdAt]

    YardInspectionList:
      type: object
      properties:
        inspections:
          type: array
          items:
            $ref: "#/components/schemas/YardInspection"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [inspections, total, page, totalPages]

    CreateYardInspectionBody:
      type: object
      properties:
        vehicleId:
          type: integer
        type:
          type: string
          enum: [pre-inspection, secondary, final-quality, new-arrival, used-arrival, periodic-fluid, periodic-damage, start-and-run]
        locationId:
          type: integer
        notes:
          type: string
        bodyDamage:
          type: string
        fuelPercentage:
          type: integer
        assignedTo:
          type: string
      required: [vehicleId, type]

    GenerateYardInspectionsBody:
      type: object
      properties:
        intervalDays:
          type: integer
          description: Include vehicles overdue or due within this many days
        autoAssign:
          type: boolean
          description: If true, distribute created inspections evenly across available technicians
        inspectionType:
          type: string
          enum: [periodic-fluid, periodic-damage, start-and-run]
          description: Type of periodic inspection to create (defaults to periodic-fluid)
        technicianIds:
          type: array
          items:
            type: string
          description: Optional list of technician names to assign to (defaults to all available)
      required: [intervalDays, autoAssign]

    GenerateYardInspectionsResponse:
      type: object
      properties:
        created:
          type: integer
        assigned:
          type: integer
        skipped:
          type: integer
        inspections:
          type: array
          items:
            $ref: "#/components/schemas/YardInspection"
      required: [created, assigned, skipped, inspections]

    AutoAssignYardInspectionsBody:
      type: object
      properties:
        inspectionIds:
          type: array
          items:
            type: integer
          description: Optional list of inspection IDs to assign (defaults to all unassigned queued)

    AutoAssignYardInspectionsResponse:
      type: object
      properties:
        assigned:
          type: integer
        total:
          type: integer
      required: [assigned, total]

    UpdateYardInspectionBody:
      type: object
      properties:
        status:
          type: string
          enum: [finished, in-progress, queued]
        notes:
          type: string
        bodyDamage:
          type: string
        fuelPercentage:
          type: integer
        completedAt:
          type: string
        assignedTo:
          type: string

    # ── Estimates ────────────────────────────────────────────────────────────
    DmsAccountType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        displayOrder:
          type: integer
        isActive:
          type: boolean
      required: [id, name, code, displayOrder, isActive]

    EstimateLine:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [labor, part, material]
        laborCategory:
          type: string
          enum: [body, refinish, mechanical, frame, glass, electrical, trim, other]
          nullable: true
        description:
          type: string
        hours:
          type: number
          nullable: true
        quantity:
          type: number
          nullable: true
        unitPrice:
          type: number
        total:
          type: number
        aiGenerated:
          type: boolean
          nullable: true
        isPackage:
          type: boolean
          nullable: true
        packageName:
          type: string
          nullable: true
        operation:
          type: string
          nullable: true
          description: The repair operation type (e.g. Repair, Replace, Refinish, Supplement, Other)
        accountType:
          type: string
          nullable: true
          description: The DMS account type code (e.g. CP, WR, IN, SL)
      required: [id, type, description, unitPrice, total]

    AnalyzeEstimateRequest:
      type: object
      properties:
        vehicleInfo:
          type: string
        damageNotes:
          type: string
        imagesBase64:
          type: array
          items:
            type: string
      required: [vehicleInfo, damageNotes]

    AnalyzeEstimateResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/EstimateLine"
      required: [lines]

    SubmitEstimateRequest:
      type: object
      properties:
        estimateId:
          type: string
        estimateNo:
          type: string
        vehicle:
          type: string
        customer:
          type: string
        serviceAdvisor:
          type: string
        odometer:
          type: string
        lines:
          type: array
          items:
            $ref: "#/components/schemas/EstimateLine"
      required: [estimateId, estimateNo, vehicle, lines]

    SubmitEstimateResponse:
      type: object
      properties:
        success:
          type: boolean
        dmsRoNumber:
          type: string
          nullable: true
          description: The Repair Order number assigned by the DMS
        message:
          type: string
      required: [success, message]

    # ── Movement ──────────────────────────────────────────────────────────────
    MovementEntry:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: integer
        locationName:
          type: string
        vehicleId:
          type: integer
          nullable: true
        vehicleName:
          type: string
          nullable: true
        action:
          type: string
        actor:
          type: string
        createdAt:
          type: string
      required: [id, locationId, locationName, action, actor, createdAt]
