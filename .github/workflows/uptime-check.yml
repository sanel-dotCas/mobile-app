name: Production Uptime Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    name: API Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/healthz
        run: |
          if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "::warning::PRODUCTION_URL secret is not set — skipping health check."
            echo "Set it to your deployed app URL (e.g. https://your-app.replit.app) in repo Settings > Secrets."
            exit 0
          fi
          URL="${{ secrets.PRODUCTION_URL }}/api/healthz"
          echo "Checking $URL"
          STATUS=$(curl -s -o response.json -w "%{http_code}" --max-time 15 "$URL" || echo "000")
          echo "HTTP status: $STATUS"
          cat response.json || true
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check FAILED — received HTTP $STATUS (expected 200). The API may be down or the database is unreachable."
            exit 1
          fi
          BODY=$(cat response.json)
          echo "Response: $BODY"
          if echo "$BODY" | grep -q '"status":"ok"'; then
            echo "Health check passed ✓"
          else
            echo "::error::Health check FAILED — unexpected response body: $BODY"
            exit 1
          fi
